window.PERM = {

/* ─────────────────────────────────────────────────────────────────────
   ٤. تحليل CSV الصحيح — يدعم الفاصلة داخل خلايا Google Sheets
   ─────────────────────────────────────────────────────────────────────*/
function permParseCSV(text) {
  // إزالة BOM وأحرف الرجوع
  text = text.replace(/^\uFEFF/, "").replace(/\r/g, "");
  var lines = text.trim().split("\n");
  if (lines.length < 2) return [];

  function parseLine(line) {
    var result = [], cur = "", inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') {
        // علامة اقتباس مضاعفة داخل الخلية
        if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        result.push(cur.trim()); cur = "";
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  }

  var rawHeaders = parseLine(lines[0]);
  var headers = rawHeaders.map(function(h) {
    return h.toLowerCase().trim().replace(/['"]/g, "");
  });

  console.log("[PERM] CSV headers:", headers);

  return lines.slice(1).filter(function(l) { return l.trim(); }).map(function(line) {
    var vals = parseLine(line);
    var obj = {};
    headers.forEach(function(h, i) { obj[h] = (vals[i] || "").trim(); });
    return obj;
  });
}

/* ─────────────────────────────────────────────────────────────────────
   ٥. البحث المرن عن مفتاح في الكائن
   ─────────────────────────────────────────────────────────────────────*/
function permFindKey(obj, candidates) {
  var keys = Object.keys(obj);
  for (var i = 0; i < candidates.length; i++) {
    var cand = candidates[i];
    // مطابقة تامة
    var exact = keys.find(function(k) { return k === cand; });
    if (exact) return exact;
    // مطابقة جزئية
    var partial = keys.find(function(k) { return k.indexOf(cand) !== -1; });
    if (partial) return partial;
  }
  return null;
}

/* ─────────────────────────────────────────────────────────────────────
   ٦. استخراج بيانات المستخدم من صف CSV
   ─────────────────────────────────────────────────────────────────────*/
function permExtractUser(rows, username) {
  if (!rows || !rows.length || !username) return null;
  var sample = rows[0];

  var UK = permFindKey(sample, ["username","user","اسم المستخدم","userid"]);
  var NK = permFindKey(sample, ["name","الاسم","fullname","full name","الاسم الكامل"]);
  var RK = permFindKey(sample, ["role","الدور","الصلاحية","وظيفة","الوظيفة"]);
  var PK = permFindKey(sample, ["pages","الصفحات","صفحات","page"]);
  var AK = permFindKey(sample, ["actions","الاجراءات","الإجراءات","صلاحيات"]);

  console.log("[PERM] مفاتيح مكتشفة:", {UK:UK, NK:NK, RK:RK, PK:PK, AK:AK});

  if (!UK) {
    console.warn("[PERM] لم يُعثر على عمود username");
    return null;
  }

  var row = null;
  for (var i = 0; i < rows.length; i++) {
    if ((rows[i][UK] || "").toLowerCase().trim() === username.toLowerCase().trim()) {
      row = rows[i]; break;
    }
  }

  if (!row) {
    console.warn("[PERM] المستخدم غير موجود:", username);
    return null;
  }

  var result = {
    username: username,
    name:    NK ? (row[NK] || username)  : username,
    role:    RK ? (row[RK] || "tech").toLowerCase().trim() : "tech",
    pages:   PK ? (row[PK] || "")        : "",
    actions: AK ? (row[AK] || "")        : ""
  };

  console.log("[PERM] بيانات المستخدم:", result);
  return result;
}

/* ─────────────────────────────────────────────────────────────────────
   ٧. اعتراض fetch — حفظ CSV عند استدعائه
   ─────────────────────────────────────────────────────────────────────*/
(function() {
  var _fetch = window.fetch;
  window.fetch = function() {
    var args = arguments;
    return _fetch.apply(this, args).then(function(res) {
      var url = (typeof args[0] === "string") ? args[0] : ((args[0] && args[0].url) || "");
      if (url.indexOf("export?format=csv") !== -1 && url.indexOf("spreadsheets") !== -1) {
        res.clone().text().then(function(csv) {
          try {
            window._permCSVRows = permParseCSV(csv);
            console.log("[PERM] CSV محفوظ، صفوف:", window._permCSVRows.length);
          } catch(e) {
            console.error("[PERM] خطأ تحليل CSV:", e);
          }
        });
      }
      return res;
    });
  };
})();

/* ─────────────────────────────────────────────────────────────────────
   ٨. مراقبة شاشة الترحيب — التقاط بيانات المستخدم فور الدخول
   ─────────────────────────────────────────────────────────────────────*/
(function() {
  var lastDisplay = "";

  var obs = new MutationObserver(function() {
    var wv = document.getElementById("l_welcomeView");
    if (!wv) return;
    var cur = wv.style.display;
    if (cur === lastDisplay) return;
    lastDisplay = cur;

    // الشاشة أصبحت مرئية (block أو أي قيمة غير none)
    if (cur !== "none" && cur !== "") {
      // انتظر قليلاً حتى يكتمل حفظ CSV
      setTimeout(function() {
        var unEl = document.getElementById("l_username");
        var username = unEl ? unEl.value.trim() : "";

        if (window._permCSVRows && username) {
          var ud = permExtractUser(window._permCSVRows, username);
          if (ud) { window._permLastUserData = ud; return; }
        }

        // Fallback: اسم من شاشة الترحيب
        var nameEl = document.getElementById("l_welcomeName");
        var displayName = nameEl
          ? nameEl.textContent.replace(/مرحباً[،,]?\s*/g,"").replace("!","").trim()
          : (username || "مستخدم");

        window._permLastUserData = {
          username: username,
          name:    displayName,
          role:    "tech",
          pages:   "",
          actions: ""
        };
      }, 300);
    }
  });

  obs.observe(document.body, {
    childList: true, subtree: true,
    attributes: true, attributeFilter: ["style"]
  });
})();

/* ─────────────────────────────────────────────────────────────────────
   ٩. تطبيق الصلاحيات
   ─────────────────────────────────────────────────────────────────────*/
function permApply(userData) {
  var role        = (userData.role || "tech").toLowerCase().trim();
  var defaultRole = PERM_DEFAULT_ROLES[role] || PERM_DEFAULT_ROLES.tech;

  // الصفحات
  var pagesRaw = (userData.pages || "").trim();
  var allowedPages = pagesRaw
    ? pagesRaw.split(",").map(function(p){ return p.trim(); }).filter(Boolean)
    : defaultRole.pages.slice();

  // الأفعال
  var actionsRaw = (userData.actions || "").trim();
  var allowedActions = actionsRaw
    ? actionsRaw.split(",").map(function(a){ return a.trim(); }).filter(Boolean)
    : defaultRole.actions.slice();

  window.PERM.currentUser    = userData;
  window.PERM.allowedPages   = allowedPages;
  window.PERM.allowedActions = allowedActions;
  window.PERM.role           = role;

  console.log("[PERM] ✅ تطبيق:", { role:role, pages:allowedPages, actions:allowedActions });

  permApplyNav(allowedPages);
  permApplyBtns(allowedActions);
  permAutoFill(userData.name || userData.username);
  permBadge(role, defaultRole.label, userData.name || userData.username);
}

/* ─────────────────────────────────────────────────────────────────────
   ١٠. إخفاء أزرار القائمة
   ─────────────────────────────────────────────────────────────────────*/
function permApplyNav(allowedPages) {
  document.querySelectorAll("nav button").forEach(function(btn) {
    var m = (btn.getAttribute("onclick") || "").match(/showPage\(['"](\w+)['"]\)/);
    if (!m) return;
    var pid = m[1];
    if (pid === "login" || pid === "home") return;

    if (allowedPages.indexOf(pid) === -1) {
      btn.style.display   = "none";
      btn.disabled        = true;
      btn.dataset.permHide = "1";
    } else {
      btn.style.display   = "";
      btn.disabled        = false;
      delete btn.dataset.permHide;
    }
  });
}

/* ─────────────────────────────────────────────────────────────────────
   ١١. تقييد الأزرار
   ─────────────────────────────────────────────────────────────────────*/
function permBlockedClick(e) {
  e.preventDefault();
  e.stopImmediatePropagation();
  showToast("⛔ ليس لديك صلاحية لتنفيذ هذا الإجراء", "warning");
}

function permApplyBtns(allowedActions) {
  Object.keys(PERM_PAGE_BUTTONS).forEach(function(page) {
    PERM_PAGE_BUTTONS[page].forEach(function(def) {
      var els = [];
      if (def.id) {
        var el = document.getElementById(def.id);
        if (el) els = [el];
      } else if (def.selector) {
        els = Array.from(document.querySelectorAll(def.selector));
      }

      els.forEach(function(el) {
        if (allowedActions.indexOf(def.action) === -1) {
          // لا نضع disabled حتى يصل حدث النقر ويظهر التنبيه
          el.style.opacity   = "0.35";
          el.style.cursor    = "not-allowed";
          el.dataset.permLock = "1";
          el.removeEventListener("click", permBlockedClick, true);
          el.addEventListener("click", permBlockedClick, true);
        } else {
          el.style.opacity   = "";
          el.style.cursor    = "";
          delete el.dataset.permLock;
          el.removeEventListener("click", permBlockedClick, true);
        }
      });
    });
  });
}

/* ─────────────────────────────────────────────────────────────────────
   ١٢. تعبئة مدخل البيانات تلقائياً
   ─────────────────────────────────────────────────────────────────────*/
function permAutoFill(userName) {
  if (!userName) return;

  var allIds = [
    "tr_dataEntryInput","bd_dataEntryInput","vacc_dataEntryInput","dataEntryInput",
    "tr_dataUpdaterInput","bd_dataUpdaterInput","vacc_dataUpdaterInput","dataUpdaterInput"
  ];

  // ① إجبار القيمة في الحقول دائماً

  function idbPut(storeName, record) {
    return idbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        record.updatedAt  = Date.now();
        record.syncStatus = record.syncStatus || 'pending';
        var tx = d.transaction(storeName, 'readwrite');
        var req = tx.objectStore(storeName).put(record);
        req.onsuccess = function() { resolve(req.result); };
        req.onerror   = function() { reject(req.error);  };
      });
    });
  }

  function idbGet(storeName, key) {
    return idbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx  = d.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbGetAll(storeName) {
    return idbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx  = d.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).getAll();
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbDelete(storeName, key) {
    return idbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx  = d.transaction(storeName, 'readwrite');
        var req = tx.objectStore(storeName).delete(key);
        req.onsuccess = function() { resolve(); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

    return idbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx    = d.transaction(storeName, 'readonly');
        var index = tx.objectStore(storeName).index('syncStatus');
        var req   = index.getAll('pending');
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function listsDbOpen() {
    return new Promise(function(resolve, reject) {
      if (listsDb) { resolve(listsDb); return; }
      var req = indexedDB.open(LISTS_DB_NAME, LISTS_DB_VERSION);

      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('lists')) {
          d.createObjectStore('lists', { keyPath: 'key' });
        }
      };

      req.onsuccess = function(e) { listsDb = e.target.result; resolve(listsDb); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  }

    return listsDbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx  = d.transaction('lists', 'readwrite');
        var req = tx.objectStore('lists').put({ key: key, data: data, savedAt: Date.now() });
        req.onsuccess = function() { resolve(); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

    return listsDbOpen().then(function(d) {
      return new Promise(function(resolve, reject) {

        var req = tx.objectStore('lists').get(key);
        req.onsuccess = function() { resolve(req.result ? req.result.data : null); };

    if (window.foloadDropdowns._cached) return;

    var _origFO = window.foloadDropdowns;
    window.foloadDropdowns = async function() {
      try {
        var [phones, dataEntry, tests, sampleTypes] = await Promise.all([
          fetchWithFallback(window.focallApi, 'fogetPhoneNumbers',    CACHE_KEYS.phones,       []),
          fetchWithFallback(window.focallApi, 'fogetDataEntryOptions',CACHE_KEYS.dataEntry,    []),
          fetchWithFallback(window.focallApi, 'fogetTestOptions',     CACHE_KEYS.tests,        []),
          fetchWithFallback(window.focallApi, 'fogetSampleTypeOptions',CACHE_KEYS.sampleTypes, [])
        ]);

        fillDatalist('phoneList',      phones);
        fillDatalist('dataEntryList',  dataEntry);
        fillDatalist('dataUpdaterList',dataEntry);
        fillDatalist('testList',       tests);
        fillDatalist('sampleTypeList', sampleTypes);

        if (!navigator.onLine) {
          showToast('📋 قوائم العينات محملة من الذاكرة المحلية', 'warning');
        }
        return true;
      } catch(e) {
        console.error('[LISTS] خطأ في foloadDropdowns:', e);
        return false;
      }
    };
    window.foloadDropdowns._cached = true;

  }, 9500);

  // ══════════════════════════════════════════════════════
  // 5. globalRefreshPhoneLists — تحديث جميع قوائم الهاتف
  // ══════════════════════════════════════════════════════
  setTimeout(function() {
    if (typeof window.globalRefreshPhoneLists !== 'function') return;
    if (window.globalRefreshPhoneLists._cached) return;

    var _origGR = window.globalRefreshPhoneLists;
    window.globalRefreshPhoneLists = async function() {
      try {
        var phones = await fetchWithFallback(
          window.bd_callApi, 'bd_getPhoneNumbers', CACHE_KEYS.phones, []
        );

        ['bd_phoneList','tr_phoneList','vacc_phoneList','phoneList'].forEach(function(id) {
          fillDatalist(id, phones);
        });
      } catch(e) {
        console.warn('[LISTS] خطأ في globalRefreshPhoneLists:', e);
        if (typeof _origGR === 'function') _origGR();
      }
    };
    window.globalRefreshPhoneLists._cached = true;

  }, 9500);

  // ══════════════════════════════════════════════════════
  // تحديث الكاش تلقائياً كل 30 دقيقة عند الاتصال
  // ══════════════════════════════════════════════════════
  setInterval(async function() {
    if (!navigator.onLine || !window._isLoggedIn) return;

    try {
      var fns = [
        { fn: window.trcallApi,   action: 'trgetPhoneNumbers',      key: CACHE_KEYS.phones    },
        { fn: window.trcallApi,   action: 'trgetDiseases',           key: CACHE_KEYS.diseases  },
        { fn: window.trcallApi,   action: 'trgetDrugs',              key: CACHE_KEYS.drugs     },
        { fn: window.trcallApi,   action: 'trgetDataEntryOptions',   key: CACHE_KEYS.dataEntry },
        { fn: window.bd_callApi,  action: 'bd_getRegionOptions',     key: CACHE_KEYS.regions   },
        { fn: window.focallApi,   action: 'fogetTestOptions',        key: CACHE_KEYS.tests     },
        { fn: window.focallApi,   action: 'fogetSampleTypeOptions',  key: CACHE_KEYS.sampleTypes}
      ];

      for (var i = 0; i < fns.length; i++) {
        var cfg = fns[i];
        if (typeof cfg.fn !== 'function') continue;
        try {
          var res = await cfg.fn(cfg.action);
          if (res && res.success && res.data && res.data.length) {
            await listsSave(cfg.key, res.data);
          }
        } catch(e) { /* تجاهل صامت */ }
      }
      console.log('[LISTS] ✅ تم تحديث كاش القوائم');
    } catch(e) {}

  }, 30 * 60 * 1000);

  // ══════════════════════════════════════════════════════
  // إضافة زر "حالة الكاش" في صفحة الإعدادات
  // ══════════════════════════════════════════════════════
  window.showListsCacheStatus = async function() {
    var keys = Object.keys(CACHE_KEYS);
    var rows = '';

    for (var i = 0; i < keys.length; i++) {
      var k    = keys[i];
      var data = await listsLoad(CACHE_KEYS[k]);
      var count = data ? data.length : 0;
      var badge = count > 0
        ? '<span style="background:#d4f8d4;color:#1b5e20;border-radius:10px;padding:2px 8px;font-size:11px;">✓ ' + count + ' عنصر</span>'
        : '<span style="background:#ffcccc;color:#7a0000;border-radius:10px;padding:2px 8px;font-size:11px;">فارغ</span>';

      var arabicName = {
        phones:'أرقام الهاتف', diseases:'الأمراض', drugs:'الأدوية',
        dataEntry:'مدخلو البيانات', regions:'المناطق',
        tests:'الفحوصات', sampleTypes:'أنواع العينات'
      }[k] || k;

      rows += '<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;">' + arabicName + '</td>'
            + '<td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center;">' + badge + '</td></tr>';
    }

    var modal = document.createElement('div');
    Object.assign(modal.style, {
      position:'fixed', inset:'0', background:'rgba(0,0,0,.5)',
      display:'flex', alignItems:'center', justifyContent:'center',
      zIndex:'99999', direction:'rtl', fontFamily:'Tahoma,Arial'
    });
    modal.innerHTML =
      '<div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:440px;box-shadow:0 8px 30px rgba(0,0,0,.3);">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
          '<strong style="font-size:15px;color:#00b8d9;">📋 حالة كاش القوائم</strong>' +
          '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:#eee;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;">✕</button>' +
        '</div>' +
        '<p style="font-size:12px;color:#666;margin:0 0 12px;background:#fff8e1;padding:8px 12px;border-radius:6px;border:1px solid #ffe082;">' +
          '💡 القوائم المحفوظة تُستخدم تلقائياً عند انقطاع الاتصال' +
        '</p>' +
        '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div style="display:flex;gap:8px;margin-top:16px;justify-content:center;">' +
          '<button onclick="refreshAndCloseListsModal(this)" style="background:#2bb673;color:#fff;border:none;border-radius:8px;padding:8px 20px;cursor:pointer;font-family:Tahoma;font-weight:bold;">🔄 تحديث الآن</button>' +
          '<button onclick="clearListsCache(this)" style="background:#e65050;color:#fff;border:none;border-radius:8px;padding:8px 20px;cursor:pointer;font-family:Tahoma;font-weight:bold;">🗑️ مسح الكاش</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', function(e){ if(e.target===modal) modal.remove(); });
  };

  window.refreshAndCloseListsModal = async function(btn) {
    btn.textContent = '⏳ جارٍ...'; btn.disabled = true;
    if (typeof window.trloadDropdowns   === 'function') await window.trloadDropdowns();
    if (typeof window.bd_refreshDropdowns === 'function') await window.bd_refreshDropdowns();
    if (typeof window.vaccLoadDropdowns === 'function') await window.vaccLoadDropdowns();
    if (typeof window.foloadDropdowns   === 'function') await window.foloadDropdowns();
    btn.closest('div[style*=fixed]').remove();
    showToast('✅ تم تحديث جميع القوائم وحفظها', 'success');
    setTimeout(window.showListsCacheStatus, 300);
  };

  window.clearListsCache = async function(btn) {
    var keys = Object.keys(CACHE_KEYS);
    for (var i = 0; i < keys.length; i++) {
      await listsDbOpen().then(function(d) {
        return new Promise(function(resolve) {
          var tx = d.transaction('lists', 'readwrite');
          tx.objectStore('lists').clear();
          tx.oncomplete = resolve;
        });
      });
    }
    btn.closest('div[style*=fixed]').remove();
    showToast('🗑️ تم مسح كاش القوائم', 'success');
  };

  // ── إضافة الزر في صفحة الإعدادات ───────────────────
  window.addEventListener('load', function() {
    var panel = document.getElementById('settingsPanel');
    if (!panel) return;
    var btn = document.createElement('button');
    Object.assign(btn.style, {
      background:'#9b59b6', color:'#fff', border:'none',
      padding:'7px 16px', borderRadius:'5px', cursor:'pointer',
      fontFamily:'Tahoma', fontWeight:'bold',
      marginTop:'8px', display:'block'
    });
    btn.textContent = '📋 حالة كاش القوائم';
    btn.onclick = window.showListsCacheStatus;
    panel.appendChild(btn);
  });

  console.log('[LISTS] ✅ نظام كاش القوائم جاهز');

})();
  
</script>

</body>
</html>
